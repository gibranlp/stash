name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: stash-linux-x86_64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: stash-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: stash-macos-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: stash-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libdbus-1-dev pkg-config

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/stash

      - name: Prepare artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/stash ${{ matrix.artifact }}

      - name: Prepare artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Copy-Item target/${{ matrix.target }}/release/stash.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            stash-linux-x86_64
            stash-macos-x86_64
            stash-macos-arm64
            stash-windows-x86_64.exe
